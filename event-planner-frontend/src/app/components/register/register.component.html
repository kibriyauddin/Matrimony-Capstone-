<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Register for Event Planner</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="onRegister()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput [(ngModel)]="full_name" name="full_name" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input
            matInput
            type="email"
            [(ngModel)]="email"
            name="email"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            type="password"
            [(ngModel)]="password"
            name="password"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Role</mat-label>
          <mat-select [(ngModel)]="role" name="role">
            <mat-option value="attendee">Attendee</mat-option>
            <mat-option value="organizer">Organizer</mat-option>
          </mat-select>
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width"
          [disabled]="loading"
        >
          {{ loading ? "Registering..." : "Register" }}
        </button>
      </form>

      <div class="login-link">
        Already have an account? <a routerLink="/login">Login here</a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
